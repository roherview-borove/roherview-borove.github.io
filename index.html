<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酷儿 - 产品失效分析科事件管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --warning-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --timeline-color: #667eea;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --border-radius: 20px;
            --box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }
        
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 50px;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }
        
        /* 头部样式 */
        .header {
            padding: 60px 0 40px;
            text-align: center;
        }
        
        .main-title {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 5px 15px rgba(255, 154, 158, 0.5)); }
            100% { filter: drop-shadow(0 5px 25px rgba(250, 208, 196, 0.8)); }
        }
        
        .subtitle {
            color: white;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }
        
        /* 添加按钮样式 */
        .add-event-container {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }
        
        .add-event-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px 45px;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .add-event-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }
        
        .add-event-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        
        .add-event-btn:hover::before {
            opacity: 1;
        }
        
        .add-event-btn:active {
            transform: translateY(0) scale(1);
        }
        
        /* 筛选区域样式 */
        .filter-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            padding: 25px 30px;
            margin-bottom: 40px;
            box-shadow: var(--box-shadow);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            align-items: center;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-width: 220px;
        }
        
        .filter-label {
            font-weight: 600;
            color: white;
            font-size: 1rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .filter-input, .filter-select {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }
        
        .filter-actions {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        
        .filter-btn {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .filter-btn.apply {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .filter-btn.reset {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
        }
        
        .filter-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        /* 时间轴样式 */
        .timeline-container {
            position: relative;
            padding: 20px 0;
        }
        
        .timeline {
            position: relative;
            padding-left: 50px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(to bottom, 
                #6a11cb, 
                #2575fc, 
                #4facfe, 
                #00f2fe, 
                #f093fb, 
                #f5576c);
            border-radius: 3px;
            box-shadow: 0 0 20px rgba(106, 17, 203, 0.5);
        }
        
        .timeline-item {
            display: flex;
            margin-bottom: 50px;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .timeline-marker {
            position: absolute;
            left: 30px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color, #667eea), var(--marker-color, #764ba2));
            z-index: 2;
            border: 4px solid white;
            box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.3);
            transition: var(--transition);
        }
        
        .timeline-item:hover .timeline-marker {
            transform: scale(1.2);
            box-shadow: 0 0 0 8px rgba(102, 126, 234, 0.4);
        }
        
        .timeline-content {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            margin-left: 70px;
            width: 100%;
            overflow: hidden;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .timeline-content:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }
        
        .timeline-content-header {
            padding: 25px 30px 20px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.9));
        }
        
        .timeline-date {
            color: #667eea;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .timeline-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text-primary);
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .timeline-description {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 1.1rem;
        }
        
        .timeline-body {
            display: flex;
            flex-wrap: wrap;
            min-height: 350px;
        }
        
        .timeline-info {
            flex: 1;
            min-width: 300px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.8), rgba(241, 245, 249, 0.8));
        }
        
        .timeline-images {
            flex: 2;
            min-width: 300px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.9));
        }
        
        .images-container {
            position: relative;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }
        
        .image-slider {
            display: flex;
            height: 100%;
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .image-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .image-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: var(--transition);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .image-slide img:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .slider-controls {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
        }
        
        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        
        .slider-dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            color: #667eea;
            transition: var(--transition);
            z-index: 3;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        
        .slider-arrow:hover {
            background: white;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            color: #764ba2;
        }
        
        .slider-arrow.prev {
            left: 20px;
        }
        
        .slider-arrow.next {
            right: 20px;
        }
        
        .no-images {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 1.2rem;
            gap: 20px;
        }
        
        .no-images i {
            font-size: 4rem;
            color: #cbd5e1;
        }
        
        .timeline-actions {
            padding: 20px 30px;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.9), rgba(241, 245, 249, 0.9));
        }
        
        .action-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .action-btn.edit {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .action-btn.delete {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.95));
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            transform: translateY(30px) scale(0.95);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }
        
        .modal-header {
            padding: 30px 40px 25px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.9));
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }
        
        .modal-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.05);
            transform: rotate(90deg);
        }
        
        .modal-body {
            padding: 30px 40px;
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }
        
        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        .image-upload-container {
            border: 3px dashed #cbd5e1;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: var(--transition);
            background: rgba(248, 250, 252, 0.5);
        }
        
        .image-upload-container:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
        }
        
        .image-upload-label {
            display: block;
            cursor: pointer;
        }
        
        .upload-icon {
            font-size: 3.5rem;
            color: #94a3b8;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        
        .image-upload-container:hover .upload-icon {
            color: #667eea;
            transform: scale(1.1);
        }
        
        .upload-text {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .upload-hint {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 25px;
        }
        
        .preview-item {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }
        
        .preview-item:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .remove-image {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .remove-image:hover {
            background: rgba(220, 38, 38, 1);
            transform: scale(1.1);
        }
        
        .modal-footer {
            padding: 25px 40px;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.9), rgba(241, 245, 249, 0.9));
            border-radius: 0 0 var(--border-radius) var(--border-radius);
        }
        
        .modal-btn {
            padding: 16px 36px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.1rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }
        
        .modal-btn.save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .modal-btn.cancel {
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            color: var(--text-primary);
        }
        
        .modal-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        /* 图片查看模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        
        .image-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .image-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }
        
        .image-modal-close {
            position: absolute;
            top: -60px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            transition: var(--transition);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }
        
        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 40px;
        }
        
        .empty-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .empty-text {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .empty-hint {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 3rem;

            .subtitle {
                font-size: 1.1rem;

            .filter-item {

            .images-container {

            .modal {

                max-width: 95%;

            .modal-header,
            .modal-body,
            .modal-footer {
                padding: 20px;
            }
            
            .slider-arrow {
                width: 40px;
                height: 40px;

        /* 图片自适应优化 */

            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;

        .adaptive-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            transition: all 0.3s ease;

        /* 动画效果 */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }

        .floating {
            animation: float 3s ease-in-out infinite;

        /* 装饰元素 */
        .decoration {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
        }
        
        .decoration-1 {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            top: 10%;
            left: 5%;

        .decoration-2 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            bottom: 10%;
            right: 5%;
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    
    <div class="container">
        <!-- 头部标题 -->
        <header class="header">
            <h1 class="main-title floating">酷儿</h1>
            <p class="subtitle">记录产品失效分析科的多彩时光</p>
        </header>
        
        <!-- 添加事件按钮 -->
        <div class="add-event-container">
            <button class="add-event-btn" id="addEventBtn">
                <i class="fas fa-plus-circle"></i>
                <span>+ 添加新事件</span>
            </button>
        </div>
        
        <!-- 筛选区域 -->
        <div class="filter-container">
            <div class="filter-item">
                <span class="filter-label">时间范围</span>
                <input type="date" class="filter-input" id="dateFrom">
            </div>
            <div class="filter-item">
                <span class="filter-label">至</span>
                <input type="date" class="filter-input" id="dateTo">
            </div>
            <div class="filter-item">
                <span class="filter-label">关键词搜索</span>
                <input type="text" class="filter-input" id="keywordSearch" placeholder="输入事件标题或描述关键词...">
            </div>
            <div class="filter-actions">
                <button class="filter-btn apply" id="applyFilter">筛选</button>
                <button class="filter-btn reset" id="resetFilter">重置</button>
            </div>
        </div>
        
        <!-- 时间轴区域 -->
        <div class="timeline-container">
            <div class="timeline" id="timeline">
                <!-- 时间轴事件将通过JavaScript动态生成 -->
            </div>
            
            <!-- 空状态提示 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">
                    <i class="far fa-calendar-plus"></i>
                </div>
                <h3 class="empty-text">暂无事件记录</h3>
                <p class="empty-hint">点击上方"添加新事件"按钮，开始记录产品失效分析科的事件</p>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑事件模态框 -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加新事件</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="eventForm">
                    <div class="form-group">
                        <label class="form-label" for="eventTime">时间</label>
                        <input type="datetime-local" class="form-input" id="eventTime" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventTitle">事件标题</label>
                        <input type="text" class="form-input" id="eventTitle" placeholder="输入事件标题..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventDescription">事件描述</label>
                        <textarea class="form-textarea" id="eventDescription" placeholder="输入事件详细描述..." rows="5"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">事件图片</label>
                        <div class="image-upload-container">
                            <label class="image-upload-label" for="imageUpload">
                                <div class="upload-icon">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                </div>
                                <div class="upload-text">点击上传图片</div>
                                <div class="upload-hint">支持JPG、PNG格式，最多可上传10张图片</div>
                            </label>
                            <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
                        </div>
                        <div class="image-preview" id="imagePreview">
                            <!-- 图片预览将在这里动态生成 -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" id="cancelModal">取消</button>
                <button class="modal-btn save" id="saveEvent">保存事件</button>
            </div>
        </div>
    </div>
    
    <!-- 图片查看模态框 -->
    <div class="image-modal" id="imageModal">
        <div class="image-modal-content">
            <img id="modalImage" src="" alt="大图预览">
            <button class="image-modal-close" id="closeImageModal">&times;</button>
        </div>
    </div>
    
    <script>
        // 事件数据示例
        let events = [
            {
                id: 1,
                date: "2026-04-14 14:30",
                title: "飞书集体沦陷！全员杀马特复古大变身",
                description: "飞书全新上线搞事模式，咱科室直接集体放飞自我！全员统一换上杀马特非主流头像，葬爱家族连夜宣布收编我们，画风辣眼又搞笑，主打一个精神小伙大乱炖，氛围感直接拉满！",
                images: [
                    
                    "https://wx4.sinaimg.cn/mw690/008cGHgDly1icb16kpt8wj30jy0aun0c.jpg"
                ]
            },
            {
                id: 2,
                date: "2026-04-15 09:15",
                title: "苟富贵 勿相忘！",
                description: "今日暴击事件：五位同事即将离职，从此工位少了欢乐搭子！含泪合拍离别大合照，万般不舍藏心底。祝我的神仙同事们前路闪闪发光，暴富顺遂，发达了可千万别忘了咱们这群老战友！",
                images: [
                    "https://wx1.sinaimg.cn/mw690/008cGHgDly1icb1c6gb58j325w1mghdx.jpg",
                    "https://wx3.sinaimg.cn/mw690/008cGHgDly1icb1c6gertj32641mchdx.jpg"
                ]
            },
            
        ];
        
        // 全局变量
        let currentEventId = null;
        let isEditing = false;
        let uploadedImages = [];
        
        // DOM元素
        const timelineEl = document.getElementById('timeline');
        const emptyStateEl = document.getElementById('emptyState');
        const addEventBtn = document.getElementById('addEventBtn');
        const eventModal = document.getElementById('eventModal');
        const imageModal = document.getElementById('imageModal');
        const closeModalBtn = document.getElementById('closeModal');
        const cancelModalBtn = document.getElementById('cancelModal');
        const saveEventBtn = document.getElementById('saveEvent');
        const eventForm = document.getElementById('eventForm');
        const modalTitle = document.getElementById('modalTitle');
        const eventTimeInput = document.getElementById('eventTime');
        const eventTitleInput = document.getElementById('eventTitle');
        const eventDescriptionInput = document.getElementById('eventDescription');
        const imageUploadInput = document.getElementById('imageUpload');
        const imagePreviewEl = document.getElementById('imagePreview');
        const modalImage = document.getElementById('modalImage');
        const closeImageModalBtn = document.getElementById('closeImageModal');
        const applyFilterBtn = document.getElementById('applyFilter');
        const resetFilterBtn = document.getElementById('resetFilter');
        const dateFromInput = document.getElementById('dateFrom');
        const dateToInput = document.getElementById('dateTo');
        const keywordSearchInput = document.getElementById('keywordSearch');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期
            const today = new Date().toISOString().split('T')[0];
            eventTimeInput.value = today + 'T10:00';
            
            // 为事件添加随机颜色标记
            assignMarkerColors();
            
            // 渲染时间轴
            renderTimeline(events);
            
            // 绑定事件监听器
            addEventBtn.addEventListener('click', openAddModal);
            closeModalBtn.addEventListener('click', closeModal);
            cancelModalBtn.addEventListener('click', closeModal);
            saveEventBtn.addEventListener('click', saveEvent);
            imageUploadInput.addEventListener('change', handleImageUpload);
            closeImageModalBtn.addEventListener('click', closeImageModal);
            applyFilterBtn.addEventListener('click', applyFilter);
            resetFilterBtn.addEventListener('click', resetFilter);
            
            // 点击模态框外部关闭
            eventModal.addEventListener('click', function(e) {
                if (e.target === eventModal) {
                    closeModal();
                }
            });
            
            imageModal.addEventListener('click', function(e) {
                if (e.target === imageModal) {
                    closeImageModal();
                }
            });
            
            // ESC键关闭模态框
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (eventModal.classList.contains('active')) closeModal();
                    if (imageModal.classList.contains('active')) closeImageModal();
                }
            });
        });
        
        // 为事件分配颜色标记
        function assignMarkerColors() {
            const colors = [
                { primary: '#667eea', secondary: '#764ba2' },
                { primary: '#4facfe', secondary: '#00f2fe' },
                { primary: '#fa709a', secondary: '#fee140' },
                { primary: '#6a11cb', secondary: '#2575fc' },
                { primary: '#f093fb', secondary: '#f5576c' }
            ];
            
            events.forEach((event, index) => {
                event.color = colors[index % colors.length];
            });
        }
        
        // 渲染时间轴
        function renderTimeline(eventsData) {
            timelineEl.innerHTML = '';
            
            if (eventsData.length === 0) {
                emptyStateEl.style.display = 'block';
                return;
            }
            
            emptyStateEl.style.display = 'none';
            
            // 按时间倒序排序
            const sortedEvents = [...eventsData].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedEvents.forEach((event, index) => {
                const eventEl = document.createElement('div');
                eventEl.className = 'timeline-item';
                eventEl.setAttribute('data-id', event.id);
                eventEl.style.animationDelay = `${index * 0.1}s`;
                
                // 格式化日期
                const eventDate = new Date(event.date);
                const formattedDate = eventDate.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // 图片轮播HTML
                let imagesHTML = '';
                let dotsHTML = '';
                
                if (event.images && event.images.length > 0) {
                    event.images.forEach((img, index) => {
                        imagesHTML += `
                            <div class="image-slide">
                                <div class="adaptive-image-container">
                                    <img src="${img}" alt="事件图片 ${index + 1}" class="adaptive-image" data-index="${index}">
                                </div>
                            </div>
                        `;
                        dotsHTML += `<div class="slider-dot ${index === 0 ? 'active' : ''}" data-index="${index}"></div>`;
                    });
                } else {
                    imagesHTML = `
                        <div class="no-images">
                            <i class="far fa-images"></i>
                            <span>暂无图片</span>
                        </div>
                    `;
                }
                
                // 设置标记颜色
                const markerStyle = event.color ? `
                    --accent-color: ${event.color.primary};
                    --marker-color: ${event.color.secondary};
                ` : '';
                
                eventEl.innerHTML = `
                    <div class="timeline-marker" style="${markerStyle}"></div>
                    <div class="timeline-content">
                        <div class="timeline-content-header">
                            <div class="timeline-date">
                                <i class="far fa-calendar-alt"></i>
                                <span>${formattedDate}</span>
                            </div>
                            <h3 class="timeline-title">${event.title}</h3>
                            <p class="timeline-description">${event.description}</p>
                        </div>
                        <div class="timeline-body">
                            <div class="timeline-info">
                                <h4 style="margin-bottom: 15px; color: #667eea; font-size: 1.2rem;">详细信息</h4>
                                <p style="margin-bottom: 8px; color: #4a5568;"><i class="fas fa-hashtag" style="margin-right: 8px; color: #667eea;"></i>事件ID: ${event.id}</p>
                                <p style="margin-bottom: 8px; color: #4a5568;"><i class="far fa-clock" style="margin-right: 8px; color: #667eea;"></i>记录时间: ${formattedDate}</p>
                                <p style="margin-bottom: 8px; color: #4a5568;"><i class="far fa-images" style="margin-right: 8px; color: #667eea;"></i>图片数量: ${event.images ? event.images.length : 0}</p>
                                ${event.images && event.images.length > 0 ? 
                                    `<p style="color: #4a5568;"><i class="fas fa-expand" style="margin-right: 8px; color: #667eea;"></i>点击图片可放大查看</p>` : ''}
                            </div>
                            <div class="timeline-images">
                                <div class="images-container">
                                    <div class="image-slider" id="slider-${event.id}" data-current="0">
                                        ${imagesHTML}
                                    </div>
                                    ${event.images && event.images.length > 1 ? `
                                    <div class="slider-arrow prev" data-slider="${event.id}">
                                        <i class="fas fa-chevron-left"></i>
                                    </div>
                                    <div class="slider-arrow next" data-slider="${event.id}">
                                        <i class="fas fa-chevron-right"></i>
                                    </div>
                                    <div class="slider-controls">
                                        ${dotsHTML}
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="timeline-actions">
                            <button class="action-btn edit" data-id="${event.id}">
                                <i class="fas fa-edit"></i>
                                <span>编辑</span>
                            </button>
                            <button class="action-btn delete" data-id="${event.id}">
                                <i class="fas fa-trash-alt"></i>
                                <span>删除</span>
                            </button>
                        </div>
                    </div>
                `;
                
                timelineEl.appendChild(eventEl);
            });
            
            // 绑定事件监听器
            bindEventListeners();
        }
        
        // 绑定事件监听器
        function bindEventListeners() {
            // 编辑按钮
            document.querySelectorAll('.action-btn.edit').forEach(btn => {
                btn.addEventListener('click', function() {
                    const eventId = parseInt(this.getAttribute('data-id'));
                    openEditModal(eventId);
                });
            });
            
            // 删除按钮
            document.querySelectorAll('.action-btn.delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const eventId = parseInt(this.getAttribute('data-id'));
                    if (confirm('确定要删除这个事件吗？此操作不可撤销。')) {
                        deleteEvent(eventId);
                    }
                });
            });
            
            // 图片点击放大
            document.querySelectorAll('.adaptive-image').forEach(img => {
                img.addEventListener('click', function() {
                    const imgSrc = this.getAttribute('src');
                    openImageModal(imgSrc);
                });
            });
            
            // 轮播箭头
            document.querySelectorAll('.slider-arrow').forEach(arrow => {
                arrow.addEventListener('click', function() {
                    const sliderId = this.getAttribute('data-slider');
                    const isNext = this.classList.contains('next');
                    navigateSlider(sliderId, isNext);
                });
            });
            
            // 轮播点
            document.querySelectorAll('.slider-dot').forEach(dot => {
                dot.addEventListener('click', function() {
                    const sliderId = this.closest('.images-container').querySelector('.image-slider').id;
                    const slideIndex = parseInt(this.getAttribute('data-index'));
                    goToSlide(sliderId, slideIndex);
                });
            });
            
            // 图片自适应处理
            document.querySelectorAll('.adaptive-image').forEach(img => {
                handleImageAspectRatio(img);
            });
        }
        
        // 处理图片宽高比
        function handleImageAspectRatio(img) {
            const container = img.closest('.adaptive-image-container');
            if (!container) return;
            
            const originalImg = new Image();
            originalImg.src = img.src;
            
            originalImg.onload = function() {
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;
                const imgWidth = this.width;
                const imgHeight = this.height;
                
                const widthRatio = containerWidth / imgWidth;
                const heightRatio = containerHeight / imgHeight;
                const scaleRatio = Math.min(widthRatio, heightRatio);
                
                const displayWidth = imgWidth * scaleRatio;
                const displayHeight = imgHeight * scaleRatio;
                
                img.style.width = `${displayWidth}px`;
                img.style.height = `${displayHeight}px`;
            };
        }
        
        // 打开添加事件模态框
        function openAddModal() {
            modalTitle.textContent = '添加新事件';
            const now = new Date();
            const formattedNow = now.toISOString().slice(0, 16);
            eventTimeInput.value = formattedNow;
            eventTitleInput.value = '';
            eventDescriptionInput.value = '';
            imagePreviewEl.innerHTML = '';
            uploadedImages = [];
            isEditing = false;
            currentEventId = null;
            
            eventModal.classList.add('active');
        }
        
        // 打开编辑事件模态框
        function openEditModal(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            modalTitle.textContent = '编辑事件';
            eventTimeInput.value = event.date.replace(' ', 'T');
            eventTitleInput.value = event.title;
            eventDescriptionInput.value = event.description;
            
            // 显示现有图片
            imagePreviewEl.innerHTML = '';
            uploadedImages = event.images ? [...event.images] : [];
            
            if (uploadedImages.length > 0) {
                uploadedImages.forEach((img, index) => {
                    addImageToPreview(img, index);
                });
            }
            
            isEditing = true;
            currentEventId = eventId;
            
            eventModal.classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            eventModal.classList.remove('active');
            setTimeout(() => {
                eventForm.reset();
                imagePreviewEl.innerHTML = '';
                uploadedImages = [];
            }, 300);
        }
        
        // 保存事件
        function saveEvent() {
            const time = eventTimeInput.value;
            const title = eventTitleInput.value.trim();
            const description = eventDescriptionInput.value.trim();
            
            if (!time || !title) {
                showMessage('请填写时间和事件标题', 'warning');
                return;
            }
            
            const formattedTime = time.replace('T', ' ');
            
            if (isEditing) {
                // 编辑现有事件
                const eventIndex = events.findIndex(e => e.id === currentEventId);
                if (eventIndex !== -1) {
                    events[eventIndex] = {
                        ...events[eventIndex],
                        date: formattedTime,
                        title,
                        description,
                        images: [...uploadedImages]
                    };
                }
            } else {
                // 添加新事件
                const newId = events.length > 0 ? Math.max(...events.map(e => e.id)) + 1 : 1;
                const newEvent = {
                    id: newId,
                    date: formattedTime,
                    title,
                    description,
                    images: [...uploadedImages],
                    color: getRandomColor()
                };
                
                events.unshift(newEvent);
            }
            
            renderTimeline(events);
            closeModal();
            
            // 显示成功消息
            showMessage(isEditing ? '事件已更新' : '事件已添加', 'success');
        }
        
        // 获取随机颜色
        function getRandomColor() {
            const colors = [
                { primary: '#667eea', secondary: '#764ba2' },
                { primary: '#4facfe', secondary: '#00f2fe' },
                { primary: '#fa709a', secondary: '#fee140' },
                { primary: '#6a11cb', secondary: '#2575fc' },
                { primary: '#f093fb', secondary: '#f5576c' }
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 删除事件
        function deleteEvent(eventId) {
            events = events.filter(e => e.id !== eventId);
            renderTimeline(events);
            showMessage('事件已删除', 'success');
        }
        
        // 处理图片上传
        function handleImageUpload(e) {
            const files = e.target.files;
            
            if (uploadedImages.length + files.length > 10) {
                showMessage('最多只能上传10张图片', 'warning');
                return;
            }
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                if (!file.type.match('image.*')) {
                    showMessage('请上传图片文件', 'warning');
                    continue;
                }
                
                if (file.size > 5 * 1024 * 1024) { // 5MB限制
                    showMessage(`图片 ${file.name} 大小超过5MB限制`, 'warning');
                    continue;
                }
                
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    uploadedImages.push(e.target.result);
                    addImageToPreview(e.target.result, uploadedImages.length - 1);
                };
                
                reader.readAsDataURL(file);
            }
            
            // 重置文件输入
            e.target.value = '';
        }
        
        // 添加图片到预览
        function addImageToPreview(imgSrc, index) {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';
            previewItem.innerHTML = `
                <img src="${imgSrc}" alt="预览图片">
                <div class="remove-image" data-index="${index}" title="删除图片">&times;</div>
            `;
            
            imagePreviewEl.appendChild(previewItem);
            
            // 绑定删除按钮事件
            previewItem.querySelector('.remove-image').addEventListener('click', function() {
                const removeIndex = parseInt(this.getAttribute('data-index'));
                uploadedImages.splice(removeIndex, 1);
                renderImagePreview();
            });
        }
        
        // 渲染图片预览
        function renderImagePreview() {
            imagePreviewEl.innerHTML = '';
            
            uploadedImages.forEach((img, index) => {
                addImageToPreview(img, index);
            });
        }
        
        // 打开图片查看模态框
        function openImageModal(imgSrc) {
            modalImage.src = imgSrc;
            imageModal.classList.add('active');
            
            // 图片加载完成后自适应处理
            modalImage.onload = function() {
                handleImageAspectRatio(modalImage);
            };
        }
        
        // 关闭图片查看模态框
        function closeImageModal() {
            imageModal.classList.remove('active');
        }
        
        // 轮播导航
        function navigateSlider(sliderId, isNext) {
            const slider = document.getElementById(sliderId);
            const slides = slider.querySelectorAll('.image-slide');
            const dots = slider.parentElement.querySelectorAll('.slider-dot');
            const currentIndex = parseInt(slider.getAttribute('data-current') || 0);
            
            let newIndex = isNext ? currentIndex + 1 : currentIndex - 1;
            
            if (newIndex >= slides.length) newIndex = 0;
            if (newIndex < 0) newIndex = slides.length - 1;
            
            goToSlide(sliderId, newIndex);
        }
        
        // 跳转到指定幻灯片
        function goToSlide(sliderId, slideIndex) {
            const slider = document.getElementById(sliderId);
            const slides = slider.querySelectorAll('.image-slide');
            const dots = slider.parentElement.querySelectorAll('.slider-dot');
            
            if (slideIndex >= 0 && slideIndex < slides.length) {
                slider.style.transform = `translateX(-${slideIndex * 100}%)`;
                slider.setAttribute('data-current', slideIndex);
                
                // 更新点状态
                dots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === slideIndex);
                });
                
                // 处理当前图片的自适应
                const currentImg = slides[slideIndex].querySelector('.adaptive-image');
                if (currentImg) {
                    handleImageAspectRatio(currentImg);
                }
            }
        }
        
        // 应用筛选
        function applyFilter() {
            const dateFrom = dateFromInput.value;
            const dateTo = dateToInput.value;
            const keyword = keywordSearchInput.value.trim().toLowerCase();
            
            let filteredEvents = [...events];
            
            // 按日期筛选
            if (dateFrom) {
                filteredEvents = filteredEvents.filter(event => {
                    const eventDate = new Date(event.date);
                    const fromDate = new Date(dateFrom);
                    return eventDate >= fromDate;
                });
            }
            
            if (dateTo) {
                filteredEvents = filteredEvents.filter(event => {
                    const eventDate = new Date(event.date);
                    const toDate = new Date(dateTo);
                    toDate.setHours(23, 59, 59, 999); // 包含当天
                    return eventDate <= toDate;
                });
            }
            
            // 按关键词筛选
            if (keyword) {
                filteredEvents = filteredEvents.filter(event => {
                    return event.title.toLowerCase().includes(keyword) || 
                           event.description.toLowerCase().includes(keyword);
                });
            }
            
            renderTimeline(filteredEvents);
            
            if (filteredEvents.length === 0) {
                showMessage('没有找到匹配的事件', 'info');
            }
        }
        
        // 重置筛选
        function resetFilter() {
            dateFromInput.value = '';
            dateToInput.value = '';
            keywordSearchInput.value = '';
            renderTimeline(events);
        }
        
        // 显示消息
        function showMessage(message, type = 'success') {
            // 创建消息元素
            const messageEl = document.createElement('div');
            messageEl.textContent = message;
            messageEl.className = 'message-popup';
            
            const gradients = {
                success: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                warning: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                info: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
            };
            
            messageEl.style.cssText = `
                position: fixed;
                top: 30px;
                right: 30px;
                background: ${gradients[type] || gradients.success};
                color: white;
                padding: 20px 30px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                z-index: 3000;
                font-weight: 600;
                transform: translateX(120%);
                transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                font-size: 1.1rem;
                max-width: 300px;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.3);
            `;
            
            document.body.appendChild(messageEl);
            
            // 显示消息
            setTimeout(() => {
                messageEl.style.transform = 'translateX(0)';
            }, 10);
            
            // 隐藏并移除消息
            setTimeout(() => {
                messageEl.style.transform = 'translateX(120%)';
                setTimeout(() => {
                    if (messageEl.parentNode) {
                        document.body.removeChild(messageEl);
                    }
                }, 400);
            }, 3000);
        }
        
        // 窗口调整大小时重新计算图片尺寸
        window.addEventListener('resize', function() {
            document.querySelectorAll('.adaptive-image').forEach(img => {
                handleImageAspectRatio(img);
            });
        });
    </script>
</body>
</html>
